# This workflow validates, deploys, and runs the specified bundle
# within a production target named "prod".
name: 'Production deployment'

# Ensure that only a single job or workflow using the same concurrency group
# runs at a time.
concurrency:
  group: prod-deploy
  cancel-in-progress: true

# Trigger this workflow whenever a push is made to the repo's main branch
# and the change touches files under bakehouse_analytics/**. Also allow
# manual runs from the Actions UI via workflow_dispatch.
on:
  push:
    branches:
      - main
    paths:
      - 'bakehouse_analytics/**'
  workflow_dispatch:

jobs:
  deploy:
    name: 'Deploy bundle'
    runs-on: ubuntu-latest

    steps:
      # Check out this repo, so that this workflow can access it.
      - uses: actions/checkout@v3

      # Download the Databricks CLI.
      # See https://github.com/databricks/setup-cli
      - uses: databricks/setup-cli@main

      # Deploy the bundle to the "prod" target as defined
      # in the bundle's settings file.
      - run: databricks bundle deploy
        working-directory: bakehouse_analytics
        env:
          DATABRICKS_TOKEN: ${{ secrets.SP_TOKEN }}
          DATABRICKS_BUNDLE_ENV: prod
