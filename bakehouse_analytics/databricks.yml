# This is a Databricks asset bundle definition for bakehouse_analytics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bakehouse_analytics
  uuid: 96b33752-71bc-4f24-a51d-78416aaea174

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-a15188f1-4014.cloud.databricks.com
    variables:
      catalog: bakehouse_analytics_dev
      schema: rnd
  prod:
    mode: production
    workspace:
      host: https://dbc-a15188f1-4014.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/deepak.snfk.adm1@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Users/deepak.snfk.adm1@outlook.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouse_analytics_dev
      schema: rnd
    permissions:
      - user_name: deepak.snfk.adm1@outlook.com
        level: CAN_MANAGE
